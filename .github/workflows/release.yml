name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }} glibc${{ matrix.glibc }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            glibc: "2.28"
            builder: zig
          - target: aarch64-unknown-linux-gnu
            glibc: "2.28"
            builder: zig
          - target: loongarch64-unknown-linux-gnu
            glibc: "2.36"
            builder: cross
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.builder }}-glibc${{ matrix.glibc }}

      - name: Install Zig
        if: matrix.builder == 'zig'
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: matrix.builder == 'zig'
        run: cargo install cargo-zigbuild --version 0.19.7 --locked

      - name: Install cross
        if: matrix.builder == 'cross'
        run: cargo install cross --git https://github.com/cross-rs/cross --rev 64b5bb4d3d34de062552b9a2093affe77b4ad16a --locked

      - name: Build with cargo-zigbuild
        if: matrix.builder == 'zig'
        run: cargo zigbuild --release --target ${{ matrix.target }}.${{ matrix.glibc }}

      - name: Build with cross
        if: matrix.builder == 'cross'
        run: cross build --release --target ${{ matrix.target }}

      - name: Verify glibc floor
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/qurbrix-hw"
          HIGHEST="$(
            objdump -T "${BIN}" \
              | awk 'match($0, /GLIBC_[0-9]+(\.[0-9]+)+/) { print substr($0, RSTART, RLENGTH) }' \
              | sort -V \
              | tail -1
          )"
          if [[ -z "${HIGHEST}" ]]; then
            echo "::error::No GLIBC symbol versions found in ${BIN}" >&2
            exit 1
          fi
          FLOOR="GLIBC_${{ matrix.glibc }}"
          if [[ "$(printf '%s\n%s\n' "${FLOOR}" "${HIGHEST}" | sort -V | tail -1)" != "${FLOOR}" ]]; then
            echo "::error::Highest required GLIBC symbol ${HIGHEST} exceeds floor ${FLOOR}" >&2
            exit 1
          fi

      - name: Package
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="qurbrix-hw-${VERSION}-${{ matrix.target }}-glibc${{ matrix.glibc }}"
          mkdir -p "${STAGE}"
          cp "target/${{ matrix.target }}/release/qurbrix-hw" "${STAGE}/"
          cp README.md README.zh-CN.md LICENSE-MIT LICENSE-APACHE "${STAGE}/"
          tar -czf "${STAGE}.tar.gz" "${STAGE}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qurbrix-hw-${{ matrix.target }}-glibc${{ matrix.glibc }}
          path: qurbrix-hw-*.tar.gz
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum *.tar.gz > SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
